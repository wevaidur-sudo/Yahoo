openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Yahoo Finance Scraper API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: finance
    description: Yahoo Finance data
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /finance/search:
    get:
      operationId: searchSymbols
      tags: [finance]
      summary: Search for stocks and symbols
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
          description: Search query (ticker or company name)
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SearchResult"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /finance/quote/{symbol}:
    get:
      operationId: getQuote
      tags: [finance]
      summary: Get stock quote
      parameters:
        - name: symbol
          in: path
          required: true
          schema:
            type: string
          description: Stock ticker symbol (e.g. AAPL)
      responses:
        "200":
          description: Stock quote data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StockQuote"
        "404":
          description: Symbol not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /finance/history/{symbol}/{period}:
    get:
      operationId: getPriceHistory
      tags: [finance]
      summary: Get historical price data
      parameters:
        - name: symbol
          in: path
          required: true
          schema:
            type: string
        - name: period
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/HistoryPeriod"
      responses:
        "200":
          description: Historical OHLCV price data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PricePoint"
        "404":
          description: Symbol not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /finance/news/{symbol}:
    get:
      operationId: getNews
      tags: [finance]
      summary: Get latest news for a symbol
      parameters:
        - name: symbol
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: News articles
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/NewsArticle"
        "404":
          description: Symbol not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /finance/summary/{symbol}:
    get:
      operationId: getCompanySummary
      tags: [finance]
      summary: Get company summary and key statistics
      parameters:
        - name: symbol
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Company summary and statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CompanySummary"
        "404":
          description: Symbol not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /finance/trending:
    get:
      operationId: getTrending
      tags: [finance]
      summary: Get trending tickers
      responses:
        "200":
          description: Trending stock symbols with basic quote data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TrendingTicker"

  /finance/analysis/{symbol}:
    get:
      operationId: getStockAnalysis
      tags: [finance]
      summary: Get AI-powered stock analysis and prediction
      parameters:
        - name: symbol
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: AI analysis with trend prediction, intraday bias, technicals, and options snapshot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StockAnalysis"
        "404":
          description: Symbol not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Analysis failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /finance/options-strategy/{symbol}:
    post:
      operationId: getOptionsStrategy
      tags: [finance]
      summary: Get AI-powered options strategy based on investment amount
      parameters:
        - name: symbol
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OptionsStrategyRequest"
      responses:
        "200":
          description: Optimal options strategy for the given investment amount
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OptionsStrategy"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Strategy generation failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    HistoryPeriod:
      type: string
      enum: ["1d", "5d", "1mo", "3mo", "6mo", "1y", "2y", "5y", "10y", "ytd", "max"]

    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    SearchResult:
      type: object
      properties:
        symbol:
          type: string
        name:
          type: string
        exchange:
          type: string
        type:
          type: string
        score:
          type: ["number", "null"]
      required:
        - symbol
        - name
        - exchange
        - type

    StockQuote:
      type: object
      properties:
        symbol:
          type: string
        name:
          type: string
        price:
          type: ["number", "null"]
        open:
          type: ["number", "null"]
        high:
          type: ["number", "null"]
        low:
          type: ["number", "null"]
        previousClose:
          type: ["number", "null"]
        change:
          type: ["number", "null"]
        changePercent:
          type: ["number", "null"]
        volume:
          type: ["number", "null"]
        avgVolume:
          type: ["number", "null"]
        marketCap:
          type: ["number", "null"]
        peRatio:
          type: ["number", "null"]
        eps:
          type: ["number", "null"]
        fiftyTwoWeekHigh:
          type: ["number", "null"]
        fiftyTwoWeekLow:
          type: ["number", "null"]
        currency:
          type: ["string", "null"]
        exchange:
          type: ["string", "null"]
        marketState:
          type: ["string", "null"]
        postMarketPrice:
          type: ["number", "null"]
        postMarketChange:
          type: ["number", "null"]
        postMarketChangePercent:
          type: ["number", "null"]
        preMarketPrice:
          type: ["number", "null"]
        preMarketChange:
          type: ["number", "null"]
        preMarketChangePercent:
          type: ["number", "null"]
        preMarketTime:
          type: ["string", "null"]
          description: ISO 8601 timestamp of the last pre-market price update
        postMarketTime:
          type: ["string", "null"]
          description: ISO 8601 timestamp of the last post-market price update
      required:
        - symbol
        - name

    PricePoint:
      type: object
      properties:
        date:
          type: string
        open:
          type: ["number", "null"]
        high:
          type: ["number", "null"]
        low:
          type: ["number", "null"]
        close:
          type: ["number", "null"]
        volume:
          type: ["number", "null"]
        adjClose:
          type: ["number", "null"]
      required:
        - date

    NewsArticle:
      type: object
      properties:
        title:
          type: string
        publisher:
          type: ["string", "null"]
        link:
          type: string
        publishedAt:
          type: ["string", "null"]
        thumbnail:
          type: ["string", "null"]
        summary:
          type: ["string", "null"]
      required:
        - title
        - link

    CompanySummary:
      type: object
      properties:
        symbol:
          type: string
        name:
          type: string
        description:
          type: ["string", "null"]
        sector:
          type: ["string", "null"]
        industry:
          type: ["string", "null"]
        website:
          type: ["string", "null"]
        employees:
          type: ["number", "null"]
        country:
          type: ["string", "null"]
        city:
          type: ["string", "null"]
        marketCap:
          type: ["number", "null"]
        enterpriseValue:
          type: ["number", "null"]
        trailingPE:
          type: ["number", "null"]
        forwardPE:
          type: ["number", "null"]
        priceToBook:
          type: ["number", "null"]
        profitMargins:
          type: ["number", "null"]
        returnOnEquity:
          type: ["number", "null"]
        revenueGrowth:
          type: ["number", "null"]
        totalRevenue:
          type: ["number", "null"]
        grossProfit:
          type: ["number", "null"]
        totalDebt:
          type: ["number", "null"]
        totalCash:
          type: ["number", "null"]
        dividendYield:
          type: ["number", "null"]
        beta:
          type: ["number", "null"]
      required:
        - symbol
        - name

    TrendingTicker:
      type: object
      properties:
        symbol:
          type: string
        name:
          type: string
        price:
          type: ["number", "null"]
        change:
          type: ["number", "null"]
        changePercent:
          type: ["number", "null"]
        volume:
          type: ["number", "null"]
        marketCap:
          type: ["number", "null"]
      required:
        - symbol
        - name

    PriceTargets:
      type: object
      properties:
        support:
          type: ["number", "null"]
        resistance:
          type: ["number", "null"]
        oneWeek:
          type: ["number", "null"]
        oneMonth:
          type: ["number", "null"]

    TrendPrediction:
      type: object
      properties:
        direction:
          type: string
          enum: [bullish, bearish, neutral]
        confidence:
          type: number
        summary:
          type: string
        reasoning:
          type: string
        priceTargets:
          $ref: "#/components/schemas/PriceTargets"
      required:
        - direction
        - confidence
        - summary
        - reasoning

    KeyLevel:
      type: object
      properties:
        price:
          type: number
        type:
          type: string
        significance:
          type: string
      required:
        - price
        - type
        - significance

    IntradayAnalysis:
      type: object
      properties:
        bias:
          type: string
          enum: [bullish, bearish, neutral]
        setup:
          type: string
        keyLevels:
          type: array
          items:
            $ref: "#/components/schemas/KeyLevel"
        topPick:
          type: boolean
        topPickReason:
          type: ["string", "null"]
      required:
        - bias
        - setup
        - keyLevels
        - topPick

    TechnicalIndicators:
      type: object
      properties:
        rsi:
          type: ["number", "null"]
        macd:
          type: ["number", "null"]
        macdSignal:
          type: ["number", "null"]
        macdHistogram:
          type: ["number", "null"]
        bollingerUpper:
          type: ["number", "null"]
        bollingerMiddle:
          type: ["number", "null"]
        bollingerLower:
          type: ["number", "null"]
        sma20:
          type: ["number", "null"]
        sma50:
          type: ["number", "null"]
        sma200:
          type: ["number", "null"]
        atr:
          type: ["number", "null"]
        volumeRatio:
          type: ["number", "null"]

    OptionPick:
      type: object
      properties:
        strike:
          type: number
        expiry:
          type: string
        premium:
          type: ["number", "null"]
        rationale:
          type: string
        impliedVolatility:
          type: ["number", "null"]
        delta:
          type: ["number", "null"]
        theoreticalPrice:
          type: ["number", "null"]
        probabilityITM:
          type: ["number", "null"]
      required:
        - strike
        - expiry
        - rationale

    DataQuality:
      type: object
      properties:
        quoteAgeSeconds:
          type: ["number", "null"]
        quoteStale:
          type: boolean
        liquidityWarnings:
          type: array
          items:
            type: string
        riskFreeRate:
          type: ["number", "null"]
      required:
        - quoteStale
        - liquidityWarnings

    OptionsSnapshot:
      type: object
      properties:
        sentiment:
          type: string
          enum: [bullish, bearish, neutral]
        putCallRatio:
          type: ["number", "null"]
        unusualActivity:
          type: string
        topCallPick:
          $ref: "#/components/schemas/OptionPick"
        topPutPick:
          $ref: "#/components/schemas/OptionPick"
      required:
        - sentiment
        - unusualActivity

    TechnicalSignal:
      type: object
      properties:
        name:
          type: string
        signal:
          type: string
          enum: [bullish, bearish, neutral]
        weight:
          type: number
        value:
          type: string
        note:
          type: string
      required:
        - name
        - signal
        - weight
        - value
        - note

    SignalScore:
      type: object
      description: >
        Rules-based signal confluence score computed deterministically from
        standard financial formulas (Wilder RSI, SMA-seeded EMA, MACD, Bollinger
        Bands, moving average alignment, volume). Not an AI estimate.
      properties:
        direction:
          type: string
          enum: [bullish, bearish, neutral]
        score:
          type: number
          description: Normalised weighted score from -100 (max bearish) to +100 (max bullish)
        bullishCount:
          type: number
        bearishCount:
          type: number
        neutralCount:
          type: number
        signals:
          type: array
          items:
            $ref: "#/components/schemas/TechnicalSignal"
      required:
        - direction
        - score
        - bullishCount
        - bearishCount
        - neutralCount
        - signals

    StockAnalysis:
      type: object
      properties:
        symbol:
          type: string
        generatedAt:
          type: string
        signalScore:
          $ref: "#/components/schemas/SignalScore"
        trend:
          $ref: "#/components/schemas/TrendPrediction"
        intraday:
          $ref: "#/components/schemas/IntradayAnalysis"
        technicalIndicators:
          $ref: "#/components/schemas/TechnicalIndicators"
        optionsSnapshot:
          $ref: "#/components/schemas/OptionsSnapshot"
        dataQuality:
          $ref: "#/components/schemas/DataQuality"
      required:
        - symbol
        - generatedAt
        - signalScore
        - trend
        - intraday
        - technicalIndicators

    StrategyLeg:
      type: object
      properties:
        type:
          type: string
          enum: [call, put, stock]
        action:
          type: string
          enum: [buy, sell]
        strike:
          type: ["number", "null"]
        expiry:
          type: ["string", "null"]
        premium:
          type: ["number", "null"]
        contracts:
          type: number
        impliedVolatility:
          type: ["number", "null"]
        delta:
          type: ["number", "null"]
        theoreticalPrice:
          type: ["number", "null"]
      required:
        - type
        - action
        - contracts

    OptionsStrategyRequest:
      type: object
      properties:
        investmentAmount:
          type: number
      required:
        - investmentAmount

    OptionsStrategy:
      type: object
      properties:
        symbol:
          type: string
        investmentAmount:
          type: number
        strategyName:
          type: string
        strategyType:
          type: string
          enum: [bullish, bearish, neutral, volatile]
        legs:
          type: array
          items:
            $ref: "#/components/schemas/StrategyLeg"
        totalCost:
          type: ["number", "null"]
        maxProfit:
          type: string
        maxLoss:
          type: string
        breakeven:
          type: string
        breakevens:
          type: array
          items:
            type: number
        probability:
          type: number
        probabilityMethod:
          type: string
        riskLevel:
          type: string
          enum: [low, medium, high]
        reasoning:
          type: string
        entryTiming:
          type: string
        exitStrategy:
          type: string
        dataQuality:
          $ref: "#/components/schemas/DataQuality"
      required:
        - symbol
        - investmentAmount
        - strategyName
        - strategyType
        - legs
        - maxProfit
        - maxLoss
        - breakeven
        - probability
        - riskLevel
        - reasoning
        - entryTiming
        - exitStrategy
