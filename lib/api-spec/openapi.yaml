openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: FinanceScope API — Intraday Trading Intelligence
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: finance
    description: Yahoo Finance data and intraday analysis

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /finance/search:
    get:
      operationId: searchSymbols
      tags: [finance]
      summary: Search for stocks and symbols
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
          description: Search query (ticker or company name)
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SearchResult"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /finance/quote/{symbol}:
    get:
      operationId: getQuote
      tags: [finance]
      summary: Get real-time stock quote
      parameters:
        - name: symbol
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Stock quote data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StockQuote"
        "404":
          description: Symbol not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /finance/history/{symbol}/{period}:
    get:
      operationId: getPriceHistory
      tags: [finance]
      summary: Get historical price data
      parameters:
        - name: symbol
          in: path
          required: true
          schema:
            type: string
        - name: period
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/HistoryPeriod"
      responses:
        "200":
          description: Historical OHLCV price data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PricePoint"
        "404":
          description: Symbol not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /finance/news/{symbol}:
    get:
      operationId: getNews
      tags: [finance]
      summary: Get latest news for a symbol
      parameters:
        - name: symbol
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: News articles
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/NewsArticle"
        "404":
          description: Symbol not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /finance/summary/{symbol}:
    get:
      operationId: getCompanySummary
      tags: [finance]
      summary: Get company summary and key statistics
      parameters:
        - name: symbol
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Company summary and statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CompanySummary"
        "404":
          description: Symbol not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /finance/trending:
    get:
      operationId: getTrending
      tags: [finance]
      summary: Get trending tickers
      responses:
        "200":
          description: Trending stock symbols with basic quote data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TrendingTicker"

  /finance/analysis/{symbol}:
    get:
      operationId: getStockAnalysis
      tags: [finance]
      summary: Full intraday analysis — VWAP, ORB, gap, RVOL, AI overlay, trade setup
      parameters:
        - name: symbol
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Intraday analysis with deterministic signal score, trade setup, and AI qualitative overlay
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StockAnalysis"
        "404":
          description: Symbol not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Analysis failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /finance/options-strategy/{symbol}:
    post:
      operationId: getOptionsStrategy
      tags: [finance]
      summary: AI-powered options strategy for a given investment amount
      parameters:
        - name: symbol
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OptionsStrategyRequest"
      responses:
        "200":
          description: Optimal options strategy with real Black-Scholes metrics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OptionsStrategy"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Strategy generation failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    HistoryPeriod:
      type: string
      enum: ["1d", "5d", "1mo", "3mo", "6mo", "1y", "2y", "5y", "10y", "ytd", "max"]

    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    SearchResult:
      type: object
      properties:
        symbol:
          type: string
        name:
          type: string
        exchange:
          type: string
        type:
          type: string
        score:
          type: ["number", "null"]
      required:
        - symbol
        - name
        - exchange
        - type

    StockQuote:
      type: object
      properties:
        symbol:
          type: string
        name:
          type: string
        price:
          type: ["number", "null"]
        open:
          type: ["number", "null"]
        high:
          type: ["number", "null"]
        low:
          type: ["number", "null"]
        previousClose:
          type: ["number", "null"]
        change:
          type: ["number", "null"]
        changePercent:
          type: ["number", "null"]
        volume:
          type: ["number", "null"]
        avgVolume:
          type: ["number", "null"]
        marketCap:
          type: ["number", "null"]
        peRatio:
          type: ["number", "null"]
        eps:
          type: ["number", "null"]
        fiftyTwoWeekHigh:
          type: ["number", "null"]
        fiftyTwoWeekLow:
          type: ["number", "null"]
        currency:
          type: ["string", "null"]
        exchange:
          type: ["string", "null"]
        marketState:
          type: ["string", "null"]
        postMarketPrice:
          type: ["number", "null"]
        postMarketChange:
          type: ["number", "null"]
        postMarketChangePercent:
          type: ["number", "null"]
        postMarketTime:
          type: ["string", "null"]
        preMarketPrice:
          type: ["number", "null"]
        preMarketChange:
          type: ["number", "null"]
        preMarketChangePercent:
          type: ["number", "null"]
        preMarketTime:
          type: ["string", "null"]
      required:
        - symbol
        - name

    PricePoint:
      type: object
      properties:
        date:
          type: string
        open:
          type: ["number", "null"]
        high:
          type: ["number", "null"]
        low:
          type: ["number", "null"]
        close:
          type: ["number", "null"]
        volume:
          type: ["number", "null"]
        adjClose:
          type: ["number", "null"]
      required:
        - date

    NewsArticle:
      type: object
      properties:
        title:
          type: string
        publisher:
          type: ["string", "null"]
        link:
          type: string
        publishedAt:
          type: ["string", "null"]
        thumbnail:
          type: ["string", "null"]
        summary:
          type: ["string", "null"]
      required:
        - title
        - link

    CompanySummary:
      type: object
      properties:
        symbol:
          type: string
        name:
          type: string
        description:
          type: ["string", "null"]
        sector:
          type: ["string", "null"]
        industry:
          type: ["string", "null"]
        website:
          type: ["string", "null"]
        employees:
          type: ["number", "null"]
        country:
          type: ["string", "null"]
        city:
          type: ["string", "null"]
        marketCap:
          type: ["number", "null"]
        enterpriseValue:
          type: ["number", "null"]
        trailingPE:
          type: ["number", "null"]
        forwardPE:
          type: ["number", "null"]
        priceToBook:
          type: ["number", "null"]
        profitMargins:
          type: ["number", "null"]
        returnOnEquity:
          type: ["number", "null"]
        revenueGrowth:
          type: ["number", "null"]
        totalRevenue:
          type: ["number", "null"]
        grossProfit:
          type: ["number", "null"]
        totalDebt:
          type: ["number", "null"]
        totalCash:
          type: ["number", "null"]
        dividendYield:
          type: ["number", "null"]
        beta:
          type: ["number", "null"]
      required:
        - symbol
        - name

    TrendingTicker:
      type: object
      properties:
        symbol:
          type: string
        name:
          type: string
        price:
          type: ["number", "null"]
        change:
          type: ["number", "null"]
        changePercent:
          type: ["number", "null"]
        volume:
          type: ["number", "null"]
        marketCap:
          type: ["number", "null"]
      required:
        - symbol
        - name

    # ── Intraday level data ────────────────────────────────────────────────────

    IntradayLevels:
      type: object
      description: >
        Deterministic intraday levels computed from real bar data on every
        request. Null fields mean the market hasn't opened yet or the specific
        data isn't available (e.g., ORB before 9:45 ET, VWAP before session open).
      properties:
        vwap:
          type: ["number", "null"]
          description: Volume-Weighted Average Price anchored to today's 9:30 AM ET open
        vwapUpper1:
          type: ["number", "null"]
          description: VWAP + 1 standard deviation band
        vwapLower1:
          type: ["number", "null"]
          description: VWAP - 1 standard deviation band
        vwapUpper2:
          type: ["number", "null"]
          description: VWAP + 2 standard deviation band
        vwapLower2:
          type: ["number", "null"]
          description: VWAP - 2 standard deviation band
        orbHigh:
          type: ["number", "null"]
          description: Opening Range high (9:30–9:45 ET)
        orbLow:
          type: ["number", "null"]
          description: Opening Range low (9:30–9:45 ET)
        orbRange:
          type: ["number", "null"]
          description: ORB high minus ORB low
        orbBroken:
          type: ["string", "null"]
          description: "up | down | none | null. null = still inside the ORB window (before 9:45 ET)"
        pdHigh:
          type: ["number", "null"]
          description: Previous day's high
        pdLow:
          type: ["number", "null"]
          description: Previous day's low
        pdClose:
          type: ["number", "null"]
          description: Previous day's closing price
        preMarketHigh:
          type: ["number", "null"]
          description: Today's pre-market session high (4:00–9:30 AM ET)
        preMarketLow:
          type: ["number", "null"]
          description: Today's pre-market session low
        gap:
          type: ["number", "null"]
          description: Gap percentage from previous close to today's session open (positive = gap up)
        gapDirection:
          type: ["string", "null"]
          description: "up | down | flat | null"
        gapFilled:
          type: ["boolean", "null"]
          description: Whether the gap has been filled during today's session
        sessionOpen:
          type: ["number", "null"]
          description: Today's regular session opening price (first bar's open at 9:30 ET)
        cumulativeVolume:
          type: ["number", "null"]
          description: Total shares traded in the regular session so far today
        rvol:
          type: ["number", "null"]
          description: Relative volume vs expected volume at this time of day (1.0 = average)
        avgDailyVolume:
          type: ["number", "null"]
          description: 3-month average daily volume
        intradayAtr:
          type: ["number", "null"]
          description: Average True Range from the last 5 daily bars — used for stop sizing

    # ── Trade setup ───────────────────────────────────────────────────────────

    TradeSetup:
      type: object
      description: >
        Deterministic intraday trade setup computed from key levels and signal score.
        Entry zone, stop, and targets are derived from VWAP, ORB, PDH/PDL, and ATR.
        This is a mechanical setup — not financial advice.
      properties:
        bias:
          type: string
          enum: [long, short, no-trade]
        setupType:
          type: string
          description: "e.g. 'ORB Breakout', 'VWAP Reclaim', 'PDH Breakout'"
        entryLow:
          type: ["number", "null"]
          description: Low end of the ideal entry zone
        entryHigh:
          type: ["number", "null"]
          description: High end of the ideal entry zone
        stopLoss:
          type: ["number", "null"]
          description: Suggested stop-loss price based on key intraday support/resistance
        target1:
          type: ["number", "null"]
          description: First intraday price target (nearest key level or 1x ORB extension)
        target2:
          type: ["number", "null"]
          description: Second intraday price target (further key level or 2x ORB extension)
        rrRatio1:
          type: ["number", "null"]
          description: Risk-reward ratio to Target 1
        rrRatio2:
          type: ["number", "null"]
          description: Risk-reward ratio to Target 2
        riskPerShare:
          type: ["number", "null"]
          description: Absolute dollar risk per share (entry mid to stop)
        bestWindow:
          type: string
          description: Time-of-day guidance for highest-probability entry
        noTradeReason:
          type: ["string", "null"]
          description: Reason for no-trade signal; null when a trade setup exists
        confidence:
          type: number
          description: 0–100 conviction score from the signal engine
      required:
        - bias
        - setupType
        - bestWindow
        - confidence

    # ── Intraday signal score ──────────────────────────────────────────────────

    TechnicalSignal:
      type: object
      properties:
        name:
          type: string
        signal:
          type: string
          enum: [bullish, bearish, neutral]
        weight:
          type: number
        value:
          type: string
        note:
          type: string
      required:
        - name
        - signal
        - weight
        - value
        - note

    SignalScore:
      type: object
      description: >
        Intraday signal confluence score computed deterministically from live bar data:
        VWAP position, Opening Range status, multi-timeframe RSI (5m+15m), gap analysis,
        pre-market levels, PDH/PDL, 15m MACD, and RVOL. Not AI — pure formula-based.
      properties:
        direction:
          type: string
          enum: [bullish, bearish, no-trade]
        conviction:
          type: number
          description: Conviction score 0 (no edge) to 100 (maximum conviction)
        bullishCount:
          type: number
        bearishCount:
          type: number
        neutralCount:
          type: number
        noTradeReason:
          type: ["string", "null"]
        signals:
          type: array
          items:
            $ref: "#/components/schemas/TechnicalSignal"
      required:
        - direction
        - conviction
        - bullishCount
        - bearishCount
        - neutralCount
        - signals

    # ── AI overlay schemas ─────────────────────────────────────────────────────

    PriceTargets:
      type: object
      properties:
        support:
          type: ["number", "null"]
          description: Nearest intraday support level
        resistance:
          type: ["number", "null"]
          description: Nearest intraday resistance level
        sessionTarget:
          type: ["number", "null"]
          description: Realistic price target for today's session

    TrendPrediction:
      type: object
      properties:
        direction:
          type: string
          enum: [bullish, bearish, neutral]
        confidence:
          type: number
        summary:
          type: string
        reasoning:
          type: string
        priceTargets:
          $ref: "#/components/schemas/PriceTargets"
      required:
        - direction
        - confidence
        - summary
        - reasoning

    KeyLevel:
      type: object
      properties:
        price:
          type: number
        type:
          type: string
        significance:
          type: string
      required:
        - price
        - type
        - significance

    IntradayAnalysis:
      type: object
      properties:
        bias:
          type: string
          enum: [bullish, bearish, neutral]
        setup:
          type: string
        keyLevels:
          type: array
          items:
            $ref: "#/components/schemas/KeyLevel"
        topPick:
          type: boolean
        topPickReason:
          type: ["string", "null"]
      required:
        - bias
        - setup
        - keyLevels
        - topPick

    OptionPick:
      type: object
      properties:
        strike:
          type: number
        expiry:
          type: string
        premium:
          type: ["number", "null"]
        rationale:
          type: string
        impliedVolatility:
          type: ["number", "null"]
        delta:
          type: ["number", "null"]
        theoreticalPrice:
          type: ["number", "null"]
        probabilityITM:
          type: ["number", "null"]
      required:
        - strike
        - expiry
        - rationale

    DataQuality:
      type: object
      properties:
        quoteAgeSeconds:
          type: ["number", "null"]
        quoteStale:
          type: boolean
        liquidityWarnings:
          type: array
          items:
            type: string
        riskFreeRate:
          type: ["number", "null"]
      required:
        - quoteStale
        - liquidityWarnings

    OptionsSnapshot:
      type: object
      properties:
        sentiment:
          type: string
          enum: [bullish, bearish, neutral]
        putCallRatio:
          type: ["number", "null"]
        unusualActivity:
          type: string
        topCallPick:
          $ref: "#/components/schemas/OptionPick"
        topPutPick:
          $ref: "#/components/schemas/OptionPick"
      required:
        - sentiment
        - unusualActivity

    # ── Root analysis response ─────────────────────────────────────────────────

    StockAnalysis:
      type: object
      properties:
        symbol:
          type: string
        generatedAt:
          type: string
        intradayLevels:
          $ref: "#/components/schemas/IntradayLevels"
        signalScore:
          $ref: "#/components/schemas/SignalScore"
        tradeSetup:
          $ref: "#/components/schemas/TradeSetup"
        trend:
          $ref: "#/components/schemas/TrendPrediction"
        intraday:
          $ref: "#/components/schemas/IntradayAnalysis"
        optionsSnapshot:
          $ref: "#/components/schemas/OptionsSnapshot"
        dataQuality:
          $ref: "#/components/schemas/DataQuality"
      required:
        - symbol
        - generatedAt
        - intradayLevels
        - signalScore
        - tradeSetup
        - trend
        - intraday

    # ── Options strategy ───────────────────────────────────────────────────────

    StrategyLeg:
      type: object
      properties:
        type:
          type: string
          enum: [call, put, stock]
        action:
          type: string
          enum: [buy, sell]
        strike:
          type: ["number", "null"]
        expiry:
          type: ["string", "null"]
        premium:
          type: ["number", "null"]
        contracts:
          type: number
        impliedVolatility:
          type: ["number", "null"]
        delta:
          type: ["number", "null"]
        theoreticalPrice:
          type: ["number", "null"]
      required:
        - type
        - action
        - contracts

    OptionsStrategyRequest:
      type: object
      properties:
        investmentAmount:
          type: number
      required:
        - investmentAmount

    OptionsStrategy:
      type: object
      properties:
        symbol:
          type: string
        investmentAmount:
          type: number
        strategyName:
          type: string
        strategyType:
          type: string
          enum: [bullish, bearish, neutral, volatile]
        legs:
          type: array
          items:
            $ref: "#/components/schemas/StrategyLeg"
        totalCost:
          type: ["number", "null"]
        maxProfit:
          type: string
        maxLoss:
          type: string
        breakeven:
          type: string
        breakevens:
          type: array
          items:
            type: number
        probability:
          type: number
        probabilityMethod:
          type: string
        riskLevel:
          type: string
          enum: [low, medium, high]
        reasoning:
          type: string
        entryTiming:
          type: string
        exitStrategy:
          type: string
        dataQuality:
          $ref: "#/components/schemas/DataQuality"
      required:
        - symbol
        - investmentAmount
        - strategyName
        - strategyType
        - legs
        - maxProfit
        - maxLoss
        - breakeven
        - probability
        - riskLevel
        - reasoning
        - entryTiming
        - exitStrategy
